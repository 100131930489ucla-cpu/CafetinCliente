<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetín - Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        section { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <!-- Menú principal -->
        <section id="menu">
            <h2>Panel de Administración</h2>
            <button id="menu_btnProductos" class="btn btn-primary">Gestionar Productos</button>
            <button id="menu_btnPedidos" class="btn btn-secondary">Ver Pedidos</button>
        </section>

        <!-- Gestión de productos (sin campo cantidad) -->
        <section id="productos" hidden>
            <h3>Gestión de Productos</h3>
            <div class="mb-3"><label>Código</label><input type="number" id="producto_inCodigo" class="form-control"></div>
            <div class="mb-3"><label>Nombre</label><input type="text" id="producto_inNombre" class="form-control"></div>
            <div class="mb-3"><label>Precio Unitario</label><input type="number" id="producto_inPrecioUnitario" class="form-control" step="0.01"></div>
            <div>
                <button id="producto_btAgregar" class="btn btn-success">Agregar</button>
                <button id="producto_btEliminar" class="btn btn-danger">Eliminar</button>
                <button id="producto_btVolver" class="btn btn-secondary">Volver</button>
            </div>
            <table class="table table-bordered mt-3">
                <thead>
                    <tr><th>Código</th><th>Nombre</th><th>Precio Unit.</th></tr>
                </thead>
                <tbody id="producto_tblRegistros"></tbody>
            </table>
        </section>

        <!-- Monitor de pedidos -->
       
        <section id="cafetin" hidden>
            <h3>Monitor de Pedidos</h3>
            <div class="mb-3">
                <label>ID del Pedido a Procesar:</label>
                <input type="text" id="cafetin_inIdPedido" class="form-control" placeholder="Ej: 3, 4, 5">
                <button id="cafetin_btnProcesar" class="btn btn-danger mt-2">Procesar Pedido</button>
            </div>
            
            <button id="cafetin_btnRecargar" class="btn btn-primary">Recargar</button>
            <button id="cafetin_btnVolver" class="btn btn-secondary">Volver</button>
            
            <table class="table table-bordered mt-3">
                <thead>
                    <tr>
                        <th>ID</th>           
                        <th>Cliente</th>
                        <th>Tipo Pago</th>
                        <th>Productos</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="cafetin_tblPedidos"></tbody>
            </table>
            <div class="mt-3">Total General: <span id="cafetin_lblTotalGeneral">0.00</span></div>
            <div>Cantidad Pedidos: <span id="cafetin_lblCantidadPedidos">0</span></div>
        </section>
    </div>
    <script type="module">
        import Cl_vMenu from "./dist/views/Cl_vMenu.js";
        import Cl_cMenu from "./dist/controllers/Cl_cMenu.js";
        new Cl_cMenu(new Cl_vMenu());
    </script>
</body>
</html>
