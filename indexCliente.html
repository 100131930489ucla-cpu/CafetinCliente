<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetín - Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Realizar Pedido</h2>
        <div class="mb-3"><label>Nombre del Cliente</label><input type="text" id="pedido_inNombreCliente" class="form-control"></div>
        <div class="mb-3"><label>Tipo de Pago</label><input type="text" id="pedido_inTipoPago" class="form-control" placeholder="Efectivo, Tarjeta, Transferencia"></div>
        <div class="mb-3"><label>Producto</label><select id="pedido_selProducto" class="form-select"></select></div>
        <div class="mb-3"><label>Cantidad</label><input type="number" id="pedido_inCantidad" class="form-control" value="1" min="1"></div>
        <button id="pedido_btnAgregarProducto" class="btn btn-secondary">Agregar Producto</button>
        
        <table class="table table-bordered mt-3">
            <thead>
                <tr><th>Producto</th><th>Cantidad</th><th>Precio Unit.</th><th>Subtotal</th><th></th></tr>
            </thead>
            <tbody id="pedido_tblProductos"></tbody>
        </table>
        <div class="mt-3">Total: <span id="pedido_lblTotal">0.00</span></div>
        <button id="pedido_btnGuardar" class="btn btn-success mt-2">Guardar Pedido</button>
    </div>
    <script type="module">
        import Cl_vPedido from "./dist/views/Cl_vPedido.js";
        import Cl_cPedido from "./dist/controllers/Cl_cPedido.js";
        new Cl_cPedido(new Cl_vPedido());
    </script>
</body>
</html>
